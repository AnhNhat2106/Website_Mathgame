<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bảng Điều Khiển Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Oxanium:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/css/theme.css" />
</head>
<body class="galaxy">

  <main class="page">
    <section class="hero">
      <div>
        <h1 class="hero-title">Hệ Thống Quản Trị</h1>
        <p class="hero-sub">Tổng số người chơi: <b th:text="${totalUsers}">0</b> | Admin: <b th:text="${adminCount}">0</b></p>
      </div>
      <span class="badge">ADMIN DASHBOARD</span>
    </section>

    <section class="card fade-up">
      <table class="glass-table">
        <thead>
          <tr>
            <th><i class="fa-solid fa-fingerprint"></i> ID</th>
            <th><i class="fa-solid fa-user"></i> Người chơi</th>
            <th><i class="fa-solid fa-ranking-star"></i> Xếp hạng</th>
            <th><i class="fa-solid fa-shield"></i> Trạng thái</th>
            <th><i class="fa-solid fa-gavel"></i> Hành động</th>
          </tr>
        </thead>
        <tbody>
          <!-- Loop through AdminUserDto -->
          <tr th:each="dto : ${users}">
            <td th:text="${dto.user.id}">1</td>
            <td>
               <div style="font-weight: 600;" th:text="${dto.user.username}">PlayerName</div>
               <div style="font-size: 12px; color: var(--text-dim);" th:text="${dto.user.email}">user@example.com</div>
               <div style="font-size: 11px; color: rgba(255,255,255,0.3);" th:text="${'Vào: ' + #temporals.format(dto.user.createdAt, 'dd/MM/yy')}"></div>
            </td>
            <td>
               <div style="font-weight: bold; color: #fbbf24;" th:text="${dto.totalPoints} + ' pts'">100 pts</div>
               <div style="font-size: 12px; color: var(--text-dim);" th:text="${dto.matches} + ' trận - ' + ${dto.winRate} + '% win'">10 trận</div>
            </td>
            <td>
              <span th:if="${dto.user.role == 'ADMIN'}" class="status-pill win" style="font-size:12px; font-weight:700;"><i class="fa-solid fa-crown"></i> ADMIN</span>
              <span th:if="${dto.user.role != 'ADMIN' and not dto.user.banned}" class="status-pill draw" style="font-size:12px;">Hoạt động</span>
              <span th:if="${dto.user.role != 'ADMIN' and dto.user.banned}" class="status-pill lose" style="font-size:12px;"><i class="fa-solid fa-ban"></i> BỊ KHÓA</span>
            </td>
            <td>
              <form th:if="${dto.user.role != 'ADMIN' and not dto.user.banned}" th:action="@{/admin/user/{id}/ban(id=${dto.user.id})}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-ghost" style="color: #ef4444; border-color: rgba(239, 68, 68, 0.4); padding: 5px 10px; font-size: 13px;"><i class="fa-solid fa-lock"></i> Khóa</button>
              </form>
              <form th:if="${dto.user.role != 'ADMIN' and dto.user.banned}" th:action="@{/admin/user/{id}/unban(id=${dto.user.id})}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-ghost" style="color: #22c55e; border-color: rgba(34, 197, 94, 0.4); padding: 5px 10px; font-size: 13px;"><i class="fa-solid fa-unlock"></i> Mở khóa</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="actions-bottom" style="display: flex; gap: 15px; justify-content: center; margin-top: 30px;">
        <a class="btn btn-ghost" href="/lobby"><i class="fa-solid fa-house"></i> Về trang chủ</a>
      </div>
    </section>
  </main>
</body>
</html>
