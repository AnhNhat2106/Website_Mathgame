<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kết quả luyện tập</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Oxanium:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="galaxy">
  <main class="practice-page">
    <section class="practice-hero">
      <h1>Kết quả luyện tập</h1>
      <p>Mức độ: <b th:text="${levelLabel}">-</b></p>
    </section>

    <section class="practice-frame fade-up">
      <div class="result-card">
        <div class="result-row">
          <span class="result-icon"><i class="fa-solid fa-list-check"></i></span>
          <div class="result-text">Tổng câu: <b th:text="${total}">0</b></div>
        </div>
        <div class="result-row">
          <span class="result-icon ok"><i class="fa-solid fa-check"></i></span>
          <div class="result-text">Đúng: <b th:text="${correct}">0</b></div>
        </div>
        <div class="result-row">
          <span class="result-icon star"><i class="fa-solid fa-star"></i></span>
          <div class="result-text">Điểm: <b th:text="${score}">0</b></div>
        </div>
      </div>

      <div class="practice-actions" style="display: flex; gap: 15px; justify-content: center; margin-top: 30px; flex-wrap: wrap;">
        <a class="practice-btn alt" href="/lobby"><i class="fa-solid fa-house"></i> Về trang chủ</a>
        <a class="practice-btn ghost" href="/practice/history"><i class="fa-solid fa-clock-rotate-left"></i> Lịch sử</a>
        <a class="practice-btn" href="/practice"><i class="fa-solid fa-rotate-right"></i> Luyện tập lại</a>
      </div>
    </section>
  </main>
</body>
</html>
