<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Bảng xếp hạng (Battle)')}"></head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <h1 class="hero-title">Bảng xếp hạng Battle</h1>
        <p class="hero-sub">Tổng điểm từ các trận đấu online</p>
      </div>
      <span class="badge">LEADERBOARD</span>
    </section>

    <section class="card fade-up">
      <table class="glass-table">
        <thead>
          <tr>
            <th><i class="fa-solid fa-medal"></i> Hạng</th>
            <th><i class="fa-solid fa-user"></i> Người chơi</th>
            <th><i class="fa-solid fa-star"></i> Tổng điểm</th>
            <th><i class="fa-solid fa-hashtag"></i> Số trận</th>
            <th><i class="fa-solid fa-check"></i> Thắng</th>
            <th><i class="fa-solid fa-handshake"></i> Hòa</th>
            <th><i class="fa-solid fa-xmark"></i> Thua</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="r, st : ${rows}">
            <td th:text="${st.count}" th:classappend="${st.count == 1 ? 'rank-gold' : (st.count == 2 ? 'rank-silver' : (st.count == 3 ? 'rank-bronze' : ''))}">1</td>
            <td th:text="${r.username}">user</td>
            <td th:text="${r.totalPoints}">0</td>
            <td th:text="${r.matches}">0</td>
            <td th:text="${r.wins}">0</td>
            <td th:text="${r.draws}">0</td>
            <td th:text="${r.losses}">0</td>
          </tr>
        </tbody>
      </table>

      <div class="actions-bottom" style="display: flex; gap: 15px; justify-content: center; margin-top: 30px;">
        <a class="btn btn-ghost" href="/lobby"><i class="fa-solid fa-house"></i> Về trang chủ</a>
        <a class="btn" href="/battle" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); border: none;"><i class="fa-solid fa-khanda"></i> Thi đấu ngay</a>
      </div>
    </section>
  </main>
</body>
</html>
